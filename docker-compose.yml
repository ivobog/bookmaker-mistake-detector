services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmaker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: bookmaker-backend
    environment:
      API_ENV: ${API_ENV}
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
      DATABASE_URL: ${DATABASE_URL}
      RAW_PAYLOAD_DIR: ${RAW_PAYLOAD_DIR}
      THE_ODDS_API_KEY: ${THE_ODDS_API_KEY:-}
      THE_ODDS_API_BASE_URL: ${THE_ODDS_API_BASE_URL:-https://api.the-odds-api.com/v4}
      THE_ODDS_API_SPORT_KEY: ${THE_ODDS_API_SPORT_KEY:-basketball_nba}
      THE_ODDS_API_REGIONS: ${THE_ODDS_API_REGIONS:-us}
      THE_ODDS_API_MARKETS: ${THE_ODDS_API_MARKETS:-spreads,totals}
      THE_ODDS_API_ODDS_FORMAT: ${THE_ODDS_API_ODDS_FORMAT:-american}
      THE_ODDS_API_BOOKMAKERS: ${THE_ODDS_API_BOOKMAKERS:-}
      THE_ODDS_API_TIMEOUT_SECONDS: ${THE_ODDS_API_TIMEOUT_SECONDS:-10.0}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    container_name: bookmaker-worker
    environment:
      WORKER_ENV: ${WORKER_ENV}
      DATABASE_URL: ${DATABASE_URL}
      RAW_PAYLOAD_DIR: ${RAW_PAYLOAD_DIR}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS}
      WORKER_JOB_MODE: ${WORKER_JOB_MODE}
      WORKER_REPOSITORY_MODE: ${WORKER_REPOSITORY_MODE}
      WORKER_TEAM_CODE: ${WORKER_TEAM_CODE}
      WORKER_SEASON_LABEL: ${WORKER_SEASON_LABEL}
      WORKER_SOURCE_URL: ${WORKER_SOURCE_URL}
      WORKER_DATASET_SOURCE_URL_TEMPLATE: ${WORKER_DATASET_SOURCE_URL_TEMPLATE:-}
      WORKER_DATASET_TEAM_CODES: ${WORKER_DATASET_TEAM_CODES:-}
      WORKER_DATASET_SEASON_LABELS: ${WORKER_DATASET_SEASON_LABELS:-}
      WORKER_DATASET_REQUESTED_BY: ${WORKER_DATASET_REQUESTED_BY:-worker-initial-production-dataset-load}
      WORKER_DATASET_RUN_LABEL: ${WORKER_DATASET_RUN_LABEL:-initial-production-dataset-load}
      WORKER_DATASET_CONTINUE_ON_ERROR: ${WORKER_DATASET_CONTINUE_ON_ERROR:-true}
      WORKER_DATASET_PERSIST_PAYLOAD: ${WORKER_DATASET_PERSIST_PAYLOAD:-true}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: bookmaker-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
